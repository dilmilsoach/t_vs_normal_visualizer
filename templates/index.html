<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matplotlib Distribution Dashboard</title>
    <!-- Tailwind CSS for sleek interface components -->
    <script src="tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 sm:text-4xl">
                Normal vs. Student's t-Distribution
            </h1>
            <p class="mt-2 text-md text-gray-600">
                Observe how the t-distribution tails drop and match the normal distribution as sample size grows.
            </p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Parameters Panel -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 md:col-span-1 h-fit">
                <h2 class="text-lg font-bold mb-4 text-gray-800">Parameters</h2>
                
                <form method="POST" action="/" class="space-y-4">
                    <div>
                        <label for="sample_size" class="block text-sm font-medium text-gray-700 mb-1">
                            Sample Size (<span class="italic">n</span>):
                        </label>
                        <input 
                            type="number" 
                            id="sample_size" 
                            name="sample_size" 
                            value="{{ sample_size }}" 
                            min="2" 
                            max="500" 
                            required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        >
                        <p class="text-xs text-gray-500 mt-1">Enter a value between 2 and 500.</p>
                    </div>
                    
                    <button 
                        type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition duration-150 ease-in-out text-sm shadow-sm"
                    >
                        Replot Figure
                    </button>
                </form>

                <div class="mt-6 pt-6 border-t border-gray-100 text-xs text-gray-500 space-y-2">
                    <p><strong>Current df:</strong> {{ sample_size - 1 }}</p>
                    <p class="leading-relaxed">Notice how lower values produce fatter tails due to high variance estimates.</p>
                </div>
            </div>

            <!-- Dynamic Image Frame Container -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 md:col-span-3 flex items-center justify-center">
                <img 
                    src="data:image/png;base64,{{ plot_url }}" 
                    alt="Distribution comparison plot generated via Matplotlib" 
                    class="max-w-full h-auto rounded-lg"
                />
            </div>
        </div>
    </div>

</body>
</html>
